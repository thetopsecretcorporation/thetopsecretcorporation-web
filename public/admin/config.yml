backend:
  name: github
  repo: thetopsecretcorporation/thetopsecretcorporation-web
  branch: main
  base_url: https://thetopsecretcorporation.com
  auth_endpoint: api/auth
  site_domain: thetopsecretcorporation.com

local_backend: true
# Intentionally use Decap's default simple workflow so admin edits commit straight to main.
# Boss expects Save/Publish in /admin to update the live site after the main deploy runs.
media_folder: public/assets/uploads
public_folder: /assets/uploads
site_url: https://thetopsecretcorporation.com
logo_url: /assets/hero.png

collections:
  - name: site_settings
    label: Site settings
    files:
      - label: Global settings
        name: settings
        file: src/content/site/settings.json
        fields:
          - { label: Site title, name: siteTitle, widget: string }
          - { label: Site description, name: siteDescription, widget: text }
          - { label: Footer left, name: footerLeft, widget: string }
          - { label: Footer right, name: footerRight, widget: string }
          - label: Social
            name: social
            widget: object
            fields:
              - { label: X URL, name: x, widget: string }
          - { label: Contact form action, name: contactFormAction, widget: string, required: false }
      - label: Homepage content
        name: home
        file: src/content/site/home.json
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Kicker, name: kicker, widget: string }
              - { label: Body, name: body, widget: text }
          - label: About
            name: about
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: paragraph, widget: text } }
              - { label: Panel chip, name: panelChip, widget: string }
      - label: Research archive settings
        name: research
        file: src/content/site/research.json
        fields:
          - { label: Eyebrow, name: eyebrow, widget: string }
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: text }
          - { label: Meta chips, name: meta, widget: list, field: { label: Chip, name: chip, widget: string } }
          - { label: Empty message, name: emptyMessage, widget: text }

  - name: research_reports
    label: Research reports
    label_singular: Research report
    description: Existing live reports can be fixed here directly. Saving commits to main and the site publishes from main.
    folder: src/content/researchReports
    create: true
    extension: md
    format: frontmatter
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    summary: '{{title}} — {{publishDate}}'
    fields:
      - { label: Title, name: title, widget: string, hint: 'Public report title' }
      - { label: Summary, name: summary, widget: text, hint: 'Used for the archive card and report intro' }
      - { label: Publish date, name: publishDate, widget: datetime, time_format: false, format: 'YYYY-MM-DD' }
      - { label: Author, name: author, widget: string, default: 'Albert' }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Draft, name: draft, widget: boolean, default: true, hint: 'Turn this on only if you want the report hidden from the public archive. For normal live edits to an existing report, leave Draft off and save.' }
      - { label: Canonical URL, name: canonicalUrl, widget: string, required: false }
      - { label: Body, name: body, widget: markdown, hint: 'Fixes to an existing report publish from main when you save. Use markdown for normal editing; use inline HTML only for richer blocks like scorecards or side-by-side comparisons.' }
