name: Deploy website

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Publish Cloudflare Pages preview
        if: github.event_name == 'pull_request'
        run: npx wrangler pages deploy dist --project-name=thetopsecretcorporation-web --branch=${{ github.head_ref }}

      - name: Publish Cloudflare Pages production
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=thetopsecretcorporation-web
